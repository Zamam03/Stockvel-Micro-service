services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true

  gateway:
    build: ./gateway
    ports:
      - "5000:5000"
    depends_on:
      - auth
      - payments
      - stockvel
    environment:
      - PORT=5000
      - AUTH_SERVICE_URL=http://auth:4001
      - PAYMENT_SERVICE_URL=http://payments:4002
      - STOCKVEL_SERVICE_URL=http://stockvel:4003

  auth:
    build: ./services/auth-service
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
    volumes:
      - ./shared:/usr/src/app/shared

  payments:
    build: ./services/payment-service
    ports:
      - "4002:4002"
    environment:
      - PORT=4002
    volumes:
      - ./shared:/usr/src/app/shared

  stockvel:
    build: ./services/stockvel-service
    ports:
      - "4003:4003"
    environment:
      - PORT=4003
    volumes:
      - ./shared:/usr/src/app/shared
